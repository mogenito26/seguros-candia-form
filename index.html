<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seguros Candia - Formulario</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #1a3a8c; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); max-width: 600px; width: 100%; overflow: hidden; }
    .card-header { background: #0d1b4b; padding: 30px; text-align: center; color: #fff; }
    .card-body { padding: 30px; }
    .section-title { font-size: 0.8rem; font-weight: 800; text-transform: uppercase; color: #1565c0; border-bottom: 2px solid #eee; margin: 20px 0 15px; padding-bottom: 5px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 5px; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .product-option input { display: none; }
    .product-option label { display: block; padding: 15px 5px; border: 2px solid #eee; border-radius: 10px; cursor: pointer; text-align: center; font-size: 0.8rem; font-weight: 600; }
    .product-option input:checked + label { border-color: #1565c0; background: #eef4ff; }
    .submenu { display: none; background: #f9f9f9; padding: 20px; border-radius: 10px; margin-top: 15px; border: 1px solid #ddd; }
    .submenu.active { display: block; }
    .btn-submit { width: 100%; padding: 15px; background: #1565c0; color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    .form-error { display: none; color: red; text-align: center; margin-top: 10px; }
    @media (max-width: 500px) { .form-row, .product-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <h1>Seguros Candia</h1>
    <p>🛡️ Tu tranquilidad es nuestra prioridad</p>
  </div>
  <div class="card-body">
    <form id="seguros-form" action="https://admin.seguroscandia.com/webhook/seguros-candia">
      <p class="section-title">Datos Personales</p>
      <div class="form-group"><label>Nombre Completo *</label><input type="text" name="nombre" required></div>
      <div class="form-row">
        <div class="form-group"><label>Identificación *</label><input type="text" name="numero_identidad" required></div>
        <div class="form-group"><label>Celular *</label><input type="text" name="celular" required></div>
      </div>
      <div class="form-group"><label>Email *</label><input type="email" name="correo" required></div>
      <div class="form-group"><label>Dirección *</label><input type="text" name="direccion" required></div>

      <p class="section-title">¿Qué deseas asegurar?</p>
      <div class="product-grid">
        <div class="product-option"><input type="radio" id="r1" name="producto" value="Autos" onchange="tab('autos')" required><label for="r1">🚗 Autos</label></div>
        <div class="product-option"><input type="radio" id="r2" name="producto" value="Hogar" onchange="tab('hogar')"><label for="r2">🏠 Hogar</label></div>
        <div class="product-option"><input type="radio" id="r3" name="producto" value="Viajes" onchange="tab('viajes')"><label for="r3">✈️ Viajes</label></div>
        <div class="product-option"><input type="radio" id="r4" name="producto" value="Vida Ind" onchange="tab('vida-i')"><label for="r4">👤 Vida Ind.</label></div>
        <div class="product-option"><input type="radio" id="r5" name="producto" value="Vida Grupo" onchange="tab('vida-g')"><label for="r5">👥 Vida Grupo</label></div>
        <div class="product-option"><input type="radio" id="r6" name="producto" value="Empresa" onchange="tab('empresa')"><label for="r6">🏢 Empresa</label></div>
      </div>

      <div class="submenu" id="s-autos"><label>Placas</label><input type="text" name="placas"></div>
      <div class="submenu" id="s-hogar"><label>Dirección Inmueble</label><input type="text" name="dir_inmueble"></div>
      <div class="submenu" id="s-viajes">
        <label>Destino</label><input type="text" name="destino">
        <label style="margin-top:10px">Edades</label><input type="text" name="edades" placeholder="Ej: 30, 25">
      </div>
      <div class="submenu" id="s-vida-i"><label>Ocupación</label><input type="text" name="ocupacion"></div>
      <div class="submenu" id="s-vida-g"><label>NIT</label><input type="text" name="nit"></div>
      <div class="submenu" id="s-empresa"><label>Actividad</label><input type="text" name="actividad"></div>

      <button type="submit" class="btn-submit" id="btn">Enviar Solicitud</button>
      <div id="err" class="form-error">Error al conectar</div>
    </form>
  </div>
</div>

<script>
  function tab(id) {
    document.querySelectorAll('.submenu').forEach(d => d.classList.remove('active'));
    document.getElementById('s-' + id).classList.add('active');
  }

  document.getElementById('seguros-form').onsubmit = function(e) {
    e.preventDefault();
    const b = document.getElementById('btn');
    b.disabled = true; b.innerText = 'Enviando...';
    
    const data = {};
    new FormData(e.target).forEach((v, k) => data[k] = v);

    fetch(e.target.action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(r => {
      if(r.ok) e.target.innerHTML = '<div style="text-align:center;padding:50px"><h2>✅ ¡Recibido!</h2><p>Seguros Candia te contactará pronto.</p></div>';
      else throw new Error();
    })
    .catch(() => {
      b.disabled = false; b.innerText = 'Enviar Solicitud';
      document.getElementById('err').style.display = 'block';
    });
  };
</script>
</body>
</html>
