<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Seguros Candia - Formulario</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0d1b4b 0%, #1a3a8c 60%, #1565c0 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 30px 16px;
    }
    .card { background: #ffffff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.35); max-width: 680px; width: 100%; overflow: hidden; }
    .card-header { background: linear-gradient(135deg, #0d1b4b, #1565c0); padding: 36px 40px 28px; text-align: center; color: #fff; }
    .logo-shield { font-size: 52px; margin-bottom: 10px; display: block; }
    .card-header h1 { font-size: 2rem; font-weight: 800; }
    .card-body { padding: 36px 40px 40px; }
    .section-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; color: #1565c0; border-bottom: 2px solid #e3eefe; padding-bottom: 6px; margin: 28px 0 18px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #1a2a4a; margin-bottom: 6px; }
    input, select { width: 100%; padding: 11px 14px; border: 1.5px solid #c8d8f0; border-radius: 8px; font-size: 0.92rem; outline: none; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .product-option input { display: none; }
    .product-option label {
      display: flex; flex-direction: column; align-items: center; padding: 14px 8px; border: 2px solid #c8d8f0; border-radius: 10px; cursor: pointer; text-align: center; background: #f7faff; transition: 0.2s;
    }
    .product-option input:checked + label { border-color: #1565c0; background: #e8f0fe; box-shadow: 0 2px 10px rgba(21,101,192,0.18); }
    .submenu { display: none; background: #f0f6ff; border: 1.5px solid #b3d0f5; border-radius: 10px; padding: 20px; margin-top: 14px; }
    .submenu.active { display: block; }
    .btn-submit {
      width: 100%; padding: 15px; background: linear-gradient(135deg, #0d1b4b, #1565c0); color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 28px;
    }
    .btn-submit:disabled { opacity: 0.6; }
    .form-error { display: none; background: #fff0f0; color: #c62828; padding: 12px; margin-top: 14px; border-radius: 8px; text-align: center; }
    .form-error.visible { display: block; }
    @media (max-width: 520px) { .form-row, .product-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="logo-shield">🛡️</span>
    <h1>Seguros Candia</h1>
    <p>Estás a un paso de tu tranquilidad</p>
  </div>

  <div class="card-body">
    <form id="seguros-form" action="https://admin.seguroscandia.com/webhook/seguros-candia">
      
      <p class="section-title">Datos Personales</p>
      <div class="form-group"><label>Nombre completo *</label><input type="text" name="nombre" required /></div>
      <div class="form-row">
        <div class="form-group"><label>Identificación *</label><input type="text" name="numero_identidad" required /></div>
        <div class="form-group"><label>Celular *</label><input type="tel" name="celular" required /></div>
      </div>
      <div class="form-group"><label>Correo electrónico *</label><input type="email" name="correo" required /></div>

      <p class="section-title">Producto de Interés</p>
      <div class="product-grid">
        <div class="product-option"><input type="radio" id="p1" name="producto" value="Autos" onchange="mostrarSub('autos')" required /><label for="p1">🚗 Autos</label></div>
        <div class="product-option"><input type="radio" id="p2" name="producto" value="Hogar" onchange="mostrarSub('hogar')" /><label for="p2">🏠 Hogar</label></div>
        <div class="product-option"><input type="radio" id="p3" name="producto" value="Viajes" onchange="mostrarSub('viajes')" /><label for="p3">✈️ Viajes</label></div>
        <div class="product-option"><input type="radio" id="p4" name="producto" value="Vida Individual" onchange="mostrarSub('vida-individual')" /><label for="p4">👤 Vida Ind.</label></div>
        <div class="product-option"><input type="radio" id="p5" name="producto" value="Vida Grupo" onchange="mostrarSub('vida-grupo')" /><label for="p5">👥 Vida Grupo</label></div>
        <div class="product-option"><input type="radio" id="p6" name="producto" value="Empresariales" onchange="mostrarSub('empresarial')" /><label for="p6">🏢 Empresarial</label></div>
      </div>

      <div class="submenu" id="sub-autos"><label>Placas</label><input type="text" name="placas" /></div>
      <div class="submenu" id="sub-hogar"><label>Dirección del inmueble</label><input type="text" name="dir_inmueble" /></div>
      <div class="submenu" id="sub-viajes"><label>Destino</label><input type="text" name="destino" /></div>
      <div class="submenu" id="sub-vida-individual"><label>Ocupación</label><input type="text" name="ocupacion" /></div>
      <div class="submenu" id="sub-vida-grupo"><label>NIT Empresa</label><input type="text" name="nit" /></div>
      <div class="submenu" id="sub-empresarial"><label>Actividad Económica</label><input type="text" name="actividad" /></div>

      <button type="submit" class="btn-submit" id="btn-envio">Enviar solicitud</button>
      <div id="msg-error" class="form-error"></div>
    </form>
  </div>
</div>

<script>
  function mostrarSub(id) {
    document.querySelectorAll('.submenu').forEach(el => el.classList.remove('active'));
    const target = document.getElementById('sub-' + id);
    if (target) target.classList.add('active');
  }

  document.getElementById('seguros-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-envio');
    const err = document.getElementById('msg-error');
    const form = e.target;
    
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    err.classList.remove('visible');

    const data = {};
    new FormData(form).forEach((val, key) => data[key] = val);

    fetch(form.action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(res => {
      if (res.ok) {
        form.innerHTML = `<div style="text-align:center; padding:40px;"><h2>✅ ¡Enviado!</h2><p>Gracias por contactar a Seguros Candia. Te llamaremos pronto.</p></div>`;
      } else {
        throw new Error();
      }
    })
    .catch(() => {
      btn.disabled = false;
      btn.textContent = 'Enviar solicitud';
      err.textContent = 'Error de conexión con el servidor.';
      err.classList.add('visible');
    });
  });
</script>
</body>
</html>
